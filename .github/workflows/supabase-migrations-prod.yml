# Applies pending SQL migrations in supabase/migrations/ to the production Supabase project.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN      — create at https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF_PROD  — Project Settings → General → Reference ID
#   SUPABASE_DB_PASSWORD_PROD  — Database password (same as local .env.supabase for prod)

name: Supabase migrations (production)

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations-prod.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF_PROD: ${{ secrets.SUPABASE_PROJECT_REF_PROD }}
          SUPABASE_DB_PASSWORD_PROD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
        run: npm run supabase:db:push:prod
