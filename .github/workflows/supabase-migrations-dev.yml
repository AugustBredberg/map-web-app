# Applies pending SQL migrations in supabase/migrations/ to the dev Supabase project.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN      — create at https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF_DEV   — Project Settings → General → Reference ID (dev project)
#   SUPABASE_DB_PASSWORD_DEV   — Database password for the dev project

name: Supabase migrations (dev)

on:
  push:
    branches: [dev]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-migrations-dev.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-dev
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push migrations to dev
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF_DEV: ${{ secrets.SUPABASE_PROJECT_REF_DEV }}
          SUPABASE_DB_PASSWORD_DEV: ${{ secrets.SUPABASE_DB_PASSWORD_DEV }}
        run: npm run supabase:db:push:dev
